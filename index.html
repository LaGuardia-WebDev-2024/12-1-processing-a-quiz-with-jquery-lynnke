<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 13 Lessons</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Web Dev Quiz</h1>

    <form id="trivia-form">
      <label>
        Who teaches Web Dev?<br />
        <select id="trivia-answer">
          <option value="Frances">Frances</option>
          <option value="Sofia">Sofia</option>
          <option value="hall">Ms. Hall</option>
          <option value="Lynn">Lynn</option>
        </select>
      </label>
      <br />
      <button type="submit">Check Answer</button>
    </form>
    <div id="result"></div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
// when the user submits the form,
// check what they picked
//  and tell them if they are correct

// submit
$("#trivia-form").on("submit", function(event){
  event.preventDefault();
  var $answer= $("#trivia-form");
  var answer = $answer.val();
  console.log(answer);
  if (answer==="Frances"); 
    $("result").text ("you wish")}
    
});

    </script>
  </body>
</html>
